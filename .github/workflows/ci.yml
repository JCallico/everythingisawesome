# Continuous Integration Workflow
# This workflow handles code quality, testing, and building

name: CI - Code Quality & Testing

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '22'
  CACHE_VERSION: v1

jobs:
  # Job 1: Code Quality & Security
  quality-checks:
    name: Code Quality & Security
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Security audit
        run: npm audit --audit-level=high

      - name: Check for outdated packages
        run: npm outdated || true

      - name: Lint root application
        run: npm run lint

      - name: Setup client dependencies
        run: |
          cd client
          npm ci

      - name: Lint client application
        run: |
          cd client
          npm run lint

      - name: Setup mobile dependencies
        run: |
          cd mobile
          npm ci

      - name: Lint mobile application
        run: |
          cd mobile
          npm run lint

  # Job 2: Testing
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: quality-checks
    
    strategy:
      matrix:
        node-version: [18, 20, 22]
        
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run server tests
        run: npm test || echo "No server tests configured"

      - name: Setup and test client
        run: |
          cd client
          npm ci
          npm test -- --coverage --watchAll=false

      - name: Setup and test mobile
        run: |
          cd mobile
          npm ci --legacy-peer-deps
          npm test -- --coverage --watchAll=false

      - name: Upload coverage reports
        if: matrix.node-version == 22
        uses: codecov/codecov-action@v4
        with:
          file: |
            ./client/coverage/lcov.info
            ./mobile/coverage/lcov.info
          flags: |
            client
            mobile
          name: app-coverage

  # Job 3: Build Applications
  build:
    name: Build Applications
    runs-on: ubuntu-latest
    needs: [quality-checks, test]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build client application
        run: |
          cd client
          npm ci
          npm run build

      - name: Install Expo CLI
        run: npm install -g @expo/cli

      - name: Validate mobile application
        run: |
          cd mobile
          npm ci
          npx expo config --type introspect

      - name: Upload client build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: client-build-${{ github.sha }}
          path: client/build/
          retention-days: 30

      - name: Upload server artifacts
        uses: actions/upload-artifact@v4
        with:
          name: server-build-${{ github.sha }}
          path: |
            server/
            app.js
            package.json
            package-lock.json
            web.config
          retention-days: 30

      - name: Generate build summary
        run: |
          echo "## 🏗️ Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Status | Node.js Version |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|-----------------|" >> $GITHUB_STEP_SUMMARY
          echo "| Client | ✅ Built | ${{ env.NODE_VERSION }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Mobile | ✅ Validated | ${{ env.NODE_VERSION }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Server | ✅ Ready | ${{ env.NODE_VERSION }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🎉 All components built successfully!" >> $GITHUB_STEP_SUMMARY
