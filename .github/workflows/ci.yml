# Continuous Integration Workflow
# This workflow handles code quality, testing, and building

name: CI - Code Quality & Testing

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: '22'
  CACHE_VERSION: v1

jobs:
  # Job 1: Code Quality & Security
  quality-checks:
    name: Code Quality & Security
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Security audit
        run: npm audit --audit-level=high

      - name: Check for outdated packages
        run: npm outdated || true

      - name: Lint root application
        run: npm run lint

      - name: Setup client dependencies
        run: |
          cd client
          npm install

      - name: Lint client application
        run: |
          cd client
          npm run lint

      - name: Setup mobile dependencies
        run: |
          cd mobile
          npm install

      - name: Lint mobile application
        run: |
          cd mobile
          npm run lint

  # Job 2: Testing
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: quality-checks
    
    strategy:
      matrix:
        node-version: [18, 20, 22]
        
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run server tests
        run: npm test || echo "No server tests configured"

      - name: Setup and test client
        run: |
          cd client
          npm install
          npm test -- --coverage --watchAll=false

      - name: Setup and test mobile
        run: |
          cd mobile
          npm install --legacy-peer-deps
          npm test -- --coverage --watchAll=false

      - name: Upload coverage reports
        if: matrix.node-version == 22
        uses: codecov/codecov-action@v4
        with:
          file: |
            ./client/coverage/lcov.info
            ./mobile/coverage/lcov.info
          flags: |
            client
            mobile
          name: app-coverage

  # Job 3: Build Applications
  build:
    name: Build Applications
    runs-on: ubuntu-latest
    needs: [quality-checks, test]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build client application
        run: |
          cd client
          npm install
          npm run build

      - name: Install Expo CLI
        run: npm install -g @expo/cli

      - name: Validate mobile application
        run: |
          cd mobile
          npm install
          npx expo config --type introspect

      - name: Prepare deployment artifact (exclude data folder and node_modules)
        run: |
          echo "📦 Preparing clean deployment artifact..."
          
          # Create a clean deployment directory
          mkdir -p deployment-artifact
          
          # Copy essential server files
          cp -r server/ deployment-artifact/
          cp app.js deployment-artifact/
          cp package.json deployment-artifact/
          cp package-lock.json deployment-artifact/
          cp web.config deployment-artifact/
          cp README.md deployment-artifact/
          cp LICENSE deployment-artifact/
          cp .deployment deployment-artifact/
          cp deploy.cmd deployment-artifact/
          
          # Copy built client application to the expected location
          mkdir -p deployment-artifact/client
          cp -r client/build/ deployment-artifact/client/
          
          # Remove data folder to avoid overwriting persistent data on server
          rm -rf data/
          echo "✅ Data folder excluded from deployment artifact"
          echo "✅ node_modules excluded from deployment artifact"
          echo "✅ Only production files included"
          
          # Show what's in the deployment artifact
          echo "📋 Deployment artifact contents:"
          ls -la deployment-artifact/
          echo ""
          echo "📋 Client build contents:"
          ls -la deployment-artifact/client/build/ || echo "No client build found"

      - name: Upload production deployment artifact
        uses: actions/upload-artifact@v4
        with:
          name: node-app
          path: deployment-artifact/
          retention-days: 30

      - name: Generate build summary
        run: |
          echo "## 🏗️ Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Status | Node.js Version |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|-----------------|" >> $GITHUB_STEP_SUMMARY
          echo "| Client | ✅ Built | ${{ env.NODE_VERSION }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Mobile | ✅ Validated | ${{ env.NODE_VERSION }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Server | ✅ Ready | ${{ env.NODE_VERSION }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📦 Deployment Artifact Optimizations" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ **Path Length Issue Fixed**: Excluded node_modules from artifact" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ **Clean Deployment**: Only production files included" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ **Data Preservation**: Data folder excluded to preserve server data" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ **Azure Optimized**: Dependencies will be installed on Azure during deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🎉 All components built successfully with optimized deployment artifact!" >> $GITHUB_STEP_SUMMARY
