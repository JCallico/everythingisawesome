# Continuous Deployment Workflow
# This workflow handles deployment to Azure Web Apps

name: CD - Deploy to Azure

on:
  workflow_run:
    workflows: ["CI - Code Quality & Testing"]
    branches: [main]
    types: [completed]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  actions: read

env:
  NODE_VERSION: '22'
  AZURE_WEBAPP_NAME: 'everythingisawesome'

jobs:
  # Job 1: Deploy to Production
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event.workflow_run.conclusion == 'success'
    # Temporarily remove environment to fix federated identity subject mismatch
    # environment: 
    #   name: production
    #   url: https://everythingisawesome-e0e3cycwcwezceem.canadaeast-01.azurewebsites.net
    
    steps:
      - name: Download complete application artifacts
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: ./
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Verify deployment package
        run: |
          echo "📦 Verifying deployment package contents..."
          echo "Files in deployment package:"
          ls -la
          echo ""
          echo "Checking if data folder was excluded (should not be present):"
          if [ -d "data" ]; then
            echo "⚠️ WARNING: data folder found in deployment package"
            ls -la data/
          else
            echo "✅ Data folder correctly excluded from deployment package"
          fi

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_B2D34B457FC84DBD932B2B893BCAB313 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_6037D42E5BA0405EA75FC80408338126 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_F976DF1D680446ECA0330678241B7509 }}

      - name: Deploy to Azure Web App (Production)
        uses: azure/webapps-deploy@v3
        id: deploy
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          slot-name: 'production'
          package: .
          clean: false  # Preserve existing files like /data folder

      - name: Configure App Settings
        run: |
          # Debug: Show current Azure context
          echo "Current Azure subscription:"
          az account show --query "{subscriptionId:id, name:name}" -o table
          
          echo "Looking for web app: ${{ env.AZURE_WEBAPP_NAME }}"
          
          # Debug: List ALL web apps first
          echo "All web apps in current subscription:"
          az webapp list --query "[].{Name:name, ResourceGroup:resourceGroup, State:state}" -o table
          
          # Get resource group with better error handling
          RESOURCE_GROUP=$(az webapp list --query "[?name=='${{ env.AZURE_WEBAPP_NAME }}'].resourceGroup" -o tsv)
          
          if [ -z "$RESOURCE_GROUP" ]; then
            echo "ERROR: Could not find web app '${{ env.AZURE_WEBAPP_NAME }}'"
            echo ""
            echo "This could mean:"
            echo "1. The web app doesn't exist yet"
            echo "2. The web app name is different" 
            echo "3. The web app is in a different subscription"
            echo ""
            echo "Please check the Azure portal or create the web app first."
            exit 1
          fi
          
          echo "Found resource group: $RESOURCE_GROUP"
          
          # Configure startup file for Node.js
          echo "Setting startup file to app.js..."
          az webapp config set \
            --name ${{ env.AZURE_WEBAPP_NAME }} \
            --resource-group "$RESOURCE_GROUP" \
            --startup-file "app.js"
          
          # Configure Node.js runtime settings
          echo "Configuring Node.js runtime settings..."
          az webapp config appsettings set \
            --name ${{ env.AZURE_WEBAPP_NAME }} \
            --resource-group "$RESOURCE_GROUP" \
            --settings \
              WEBSITE_NODE_DEFAULT_VERSION=~${{ env.NODE_VERSION }} \
              WEBSITE_RUN_FROM_PACKAGE=0 \
              SCM_DO_BUILD_DURING_DEPLOYMENT=false \
              IISNODE_yml="iisnode.yml" \
              WEBSITE_HTTPLOGGING_RETENTION_DAYS=3
          
          # Configure application environment variables
          echo "Setting application environment variables..."
          az webapp config appsettings set \
            --name ${{ env.AZURE_WEBAPP_NAME }} \
            --resource-group "$RESOURCE_GROUP" \
            --settings \
              NODE_ENV=production \
              GROK_API_KEY="${{ secrets.GROK_API_KEY }}" \
              NEWS_API_KEY="${{ secrets.NEWS_API_KEY }}"

      - name: Restart application
        run: |
          RESOURCE_GROUP=$(az webapp list --query "[?name=='${{ env.AZURE_WEBAPP_NAME }}'].resourceGroup" -o tsv)
          
          if [ -z "$RESOURCE_GROUP" ]; then
            echo "ERROR: Could not find web app '${{ env.AZURE_WEBAPP_NAME }}'"
            exit 1
          fi
          
          echo "Restarting web app in resource group: $RESOURCE_GROUP"
          az webapp restart --name ${{ env.AZURE_WEBAPP_NAME }} --resource-group "$RESOURCE_GROUP"

      - name: Verify data folder preservation
        run: |
          RESOURCE_GROUP=$(az webapp list --query "[?name=='${{ env.AZURE_WEBAPP_NAME }}'].resourceGroup" -o tsv)
          
          if [ -z "$RESOURCE_GROUP" ]; then
            echo "ERROR: Could not find web app '${{ env.AZURE_WEBAPP_NAME }}'"
            exit 1
          fi
          
          echo "🔍 Verifying that data folder is preserved on server..."
          
          # Use Azure CLI to check if data folder exists on the server
          # This command lists the site's file structure
          DATA_FOLDER_CHECK=$(az webapp deploy list-publishing-credentials \
            --name ${{ env.AZURE_WEBAPP_NAME }} \
            --resource-group "$RESOURCE_GROUP" \
            --query "scmUri" -o tsv 2>/dev/null || echo "")
          
          if [ -n "$DATA_FOLDER_CHECK" ]; then
            echo "✅ Azure Web App is accessible for verification"
          else
            echo "⚠️ Could not verify data folder directly, but deployment used clean: false"
          fi

      - name: Run production smoke tests
        run: |
          # Wait for deployment to be ready
          sleep 60
          
          # Enhanced health check with data folder verification
          echo "🏥 Running enhanced health check..."
          HEALTH_RESPONSE=$(curl -s https://everythingisawesome-e0e3cycwcwezceem.canadaeast-01.azurewebsites.net/health)
          echo "Health response: $HEALTH_RESPONSE"
          
          # Parse health response to check data folder
          DATA_FOLDER_EXISTS=$(echo "$HEALTH_RESPONSE" | grep -o '"folder_exists":[^,}]*' | cut -d':' -f2 | tr -d ' ')
          JSON_FILES=$(echo "$HEALTH_RESPONSE" | grep -o '"json_files":[^,}]*' | cut -d':' -f2 | tr -d ' ')
          IMAGE_FILES=$(echo "$HEALTH_RESPONSE" | grep -o '"image_files":[^,}]*' | cut -d':' -f2 | tr -d ' ')
          
          echo "📁 Data folder exists: $DATA_FOLDER_EXISTS"
          echo "📄 JSON files count: $JSON_FILES"
          echo "🖼️ Image files count: $IMAGE_FILES"
          
          if [ "$DATA_FOLDER_EXISTS" = "true" ]; then
            echo "✅ Data folder successfully preserved on server"
          else
            echo "❌ ERROR: Data folder not found on server!"
            exit 1
          fi
          
          # API endpoint check
          curl -f https://everythingisawesome-e0e3cycwcwezceem.canadaeast-01.azurewebsites.net/api/news || exit 1
          
          # Test that a specific generated image is available
          echo "🖼️ Testing specific generated image availability..."
          curl -f -I https://everythingisawesome-e0e3cycwcwezceem.canadaeast-01.azurewebsites.net/data/generated-images/fallback-hope.png && echo "✅ Generated images accessible" || echo "⚠️ Some images may not be available"
          
          echo "✅ Production deployment successful and data folder preserved"

      - name: Create deployment summary
        run: |
          echo "## 🚀 Production Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Status | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| Web App | ✅ Deployed | https://everythingisawesome-e0e3cycwcwezceem.canadaeast-01.azurewebsites.net |" >> $GITHUB_STEP_SUMMARY
          echo "| API | ✅ Healthy | https://everythingisawesome-e0e3cycwcwezceem.canadaeast-01.azurewebsites.net/api |" >> $GITHUB_STEP_SUMMARY
          echo "| Health Check | ✅ Passed | https://everythingisawesome-e0e3cycwcwezceem.canadaeast-01.azurewebsites.net/health |" >> $GITHUB_STEP_SUMMARY
          echo "| Data Folder | ✅ Preserved | /data directory maintained on server |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 📁 Data Preservation Details" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Data folder excluded from deployment artifact" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Azure deployment used \`clean: false\` setting" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Persistent data verified via health endpoint" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Generated images remain accessible" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🎉 **Deployment completed successfully with data preservation!**" >> $GITHUB_STEP_SUMMARY

  # Job 2: Rollback (if deployment fails)
  rollback:
    name: Rollback Deployment
    runs-on: ubuntu-latest
    if: failure() && needs.deploy-production.result == 'failure'
    needs: [deploy-production]
    
    steps:
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_B2D34B457FC84DBD932B2B893BCAB313 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_6037D42E5BA0405EA75FC80408338126 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_F976DF1D680446ECA0330678241B7509 }}

      - name: Rollback to previous deployment
        run: |
          RESOURCE_GROUP=$(az webapp list --query "[?name=='${{ env.AZURE_WEBAPP_NAME }}'].resourceGroup" -o tsv)
          
          if [ -z "$RESOURCE_GROUP" ]; then
            echo "ERROR: Could not find web app '${{ env.AZURE_WEBAPP_NAME }}'"
            exit 1
          fi
          
          echo "Looking for previous deployment in resource group: $RESOURCE_GROUP"
          
          # Get the last successful deployment
          LAST_DEPLOYMENT=$(az webapp deployment list \
            --name ${{ env.AZURE_WEBAPP_NAME }} \
            --resource-group "$RESOURCE_GROUP" \
            --query "[?status=='4'].id | [0]" -o tsv)
          
          if [ -n "$LAST_DEPLOYMENT" ]; then
            echo "Rolling back to deployment: $LAST_DEPLOYMENT"
            az webapp deployment source sync \
              --name ${{ env.AZURE_WEBAPP_NAME }} \
              --resource-group "$RESOURCE_GROUP"
          else
            echo "No previous successful deployment found"
          fi

      - name: Notify rollback
        run: |
          echo "## ⚠️ Deployment Rollback Executed" >> $GITHUB_STEP_SUMMARY
          echo "The deployment failed and has been rolled back to the previous version." >> $GITHUB_STEP_SUMMARY
          echo "Please check the deployment logs and fix any issues before retrying." >> $GITHUB_STEP_SUMMARY
