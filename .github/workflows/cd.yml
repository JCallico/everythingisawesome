# Continuous Deployment Workflow
# This workflow handles deployment to Azure Web Apps

name: CD - Deploy to Azure

on:
  workflow_run:
    workflows: ["CI - Code Quality & Testing"]
    branches: [main]
    types: [completed]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  actions: read

env:
  NODE_VERSION: '22'
  AZURE_WEBAPP_NAME: 'everythingisawesome'

jobs:
  # Job 1: Deploy to Production
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event.workflow_run.conclusion == 'success'
    # Temporarily remove environment to fix federated identity subject mismatch
    # environment: 
    #   name: production
    #   url: https://everythingisawesome-e0e3cycwcwezceem.canadaeast-01.azurewebsites.net
    
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: client-build-${{ github.event.workflow_run.head_sha }}
          path: ./client/build/
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Download server artifacts
        uses: actions/download-artifact@v4
        with:
          name: server-build-${{ github.event.workflow_run.head_sha }}
          path: ./
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_B2D34B457FC84DBD932B2B893BCAB313 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_6037D42E5BA0405EA75FC80408338126 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_F976DF1D680446ECA0330678241B7509 }}

      - name: Deploy to Azure Web App (Production)
        uses: azure/webapps-deploy@v3
        id: deploy
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          slot-name: 'production'
          package: .

      - name: Configure App Settings
        run: |
          # Debug: Show current Azure context
          echo "Current Azure subscription:"
          az account show --query "{subscriptionId:id, name:name}" -o table
          
          echo "Looking for web app: ${{ env.AZURE_WEBAPP_NAME }}"
          
          # Debug: List ALL web apps first
          echo "All web apps in current subscription:"
          az webapp list --query "[].{Name:name, ResourceGroup:resourceGroup, State:state}" -o table
          
          # Get resource group with better error handling
          RESOURCE_GROUP=$(az webapp list --query "[?name=='${{ env.AZURE_WEBAPP_NAME }}'].resourceGroup" -o tsv)
          
          if [ -z "$RESOURCE_GROUP" ]; then
            echo "ERROR: Could not find web app '${{ env.AZURE_WEBAPP_NAME }}'"
            echo ""
            echo "This could mean:"
            echo "1. The web app doesn't exist yet"
            echo "2. The web app name is different" 
            echo "3. The web app is in a different subscription"
            echo ""
            echo "Please check the Azure portal or create the web app first."
            exit 1
          fi
          
          echo "Found resource group: $RESOURCE_GROUP"
          
          # Configure app settings
          az webapp config appsettings set \
            --name ${{ env.AZURE_WEBAPP_NAME }} \
            --resource-group "$RESOURCE_GROUP" \
            --settings \
              NODE_ENV=production \
              WEBSITE_NODE_DEFAULT_VERSION=~${{ env.NODE_VERSION }} \
              WEBSITE_RUN_FROM_PACKAGE=0 \
              SCM_DO_BUILD_DURING_DEPLOYMENT=false \
              GROK_API_KEY="${{ secrets.GROK_API_KEY }}" \
              NEWS_API_KEY="${{ secrets.NEWS_API_KEY }}"

      - name: Restart application
        run: |
          RESOURCE_GROUP=$(az webapp list --query "[?name=='${{ env.AZURE_WEBAPP_NAME }}'].resourceGroup" -o tsv)
          
          if [ -z "$RESOURCE_GROUP" ]; then
            echo "ERROR: Could not find web app '${{ env.AZURE_WEBAPP_NAME }}'"
            exit 1
          fi
          
          echo "Restarting web app in resource group: $RESOURCE_GROUP"
          az webapp restart --name ${{ env.AZURE_WEBAPP_NAME }} --resource-group "$RESOURCE_GROUP"

      - name: Run production smoke tests
        run: |
          # Wait for deployment to be ready
          sleep 60
          
          # Health check
          curl -f https://everythingisawesome-e0e3cycwcwezceem.canadaeast-01.azurewebsites.net/health || exit 1
          
          # API endpoint check
          curl -f https://everythingisawesome-e0e3cycwcwezceem.canadaeast-01.azurewebsites.net/api/news || exit 1
          
          echo "✅ Production deployment successful and healthy"

      - name: Create deployment summary
        run: |
          echo "## 🚀 Production Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Status | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| Web App | ✅ Deployed | https://everythingisawesome-e0e3cycwcwezceem.canadaeast-01.azurewebsites.net |" >> $GITHUB_STEP_SUMMARY
          echo "| API | ✅ Healthy | https://everythingisawesome-e0e3cycwcwezceem.canadaeast-01.azurewebsites.net/api |" >> $GITHUB_STEP_SUMMARY
          echo "| Health Check | ✅ Passed | https://everythingisawesome-e0e3cycwcwezceem.canadaeast-01.azurewebsites.net/health |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🎉 **Deployment completed successfully!**" >> $GITHUB_STEP_SUMMARY

  # Job 2: Rollback (if deployment fails)
  rollback:
    name: Rollback Deployment
    runs-on: ubuntu-latest
    if: failure() && needs.deploy-production.result == 'failure'
    needs: [deploy-production]
    
    steps:
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_B2D34B457FC84DBD932B2B893BCAB313 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_6037D42E5BA0405EA75FC80408338126 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_F976DF1D680446ECA0330678241B7509 }}

      - name: Rollback to previous deployment
        run: |
          RESOURCE_GROUP=$(az webapp list --query "[?name=='${{ env.AZURE_WEBAPP_NAME }}'].resourceGroup" -o tsv)
          
          if [ -z "$RESOURCE_GROUP" ]; then
            echo "ERROR: Could not find web app '${{ env.AZURE_WEBAPP_NAME }}'"
            exit 1
          fi
          
          echo "Looking for previous deployment in resource group: $RESOURCE_GROUP"
          
          # Get the last successful deployment
          LAST_DEPLOYMENT=$(az webapp deployment list \
            --name ${{ env.AZURE_WEBAPP_NAME }} \
            --resource-group "$RESOURCE_GROUP" \
            --query "[?status=='4'].id | [0]" -o tsv)
          
          if [ -n "$LAST_DEPLOYMENT" ]; then
            echo "Rolling back to deployment: $LAST_DEPLOYMENT"
            az webapp deployment source sync \
              --name ${{ env.AZURE_WEBAPP_NAME }} \
              --resource-group "$RESOURCE_GROUP"
          else
            echo "No previous successful deployment found"
          fi

      - name: Notify rollback
        run: |
          echo "## ⚠️ Deployment Rollback Executed" >> $GITHUB_STEP_SUMMARY
          echo "The deployment failed and has been rolled back to the previous version." >> $GITHUB_STEP_SUMMARY
          echo "Please check the deployment logs and fix any issues before retrying." >> $GITHUB_STEP_SUMMARY
