# Continuous Deployment Workflow
# This workflow handles deployment to Azure Web Apps

name: CD - Deploy to Azure

on:
  workflow_run:
    workflows: ["CI - Code Quality & Testing"]
    branches: [main]
    types: [completed]
  workflow_dispatch:

permissions:
  id-token: write
  contents: read
  actions: read

env:
  NODE_VERSION: '22'
  AZURE_WEBAPP_NAME: 'everythingisawesome'
  # Default app URL - can be overridden by setting APP_URL repository variable in GitHub
  DEFAULT_APP_URL: 'https://everythingisawesome-e0e3cycwcwezceem.canadaeast-01.azurewebsites.net'

jobs:
  # Job 1: Pre-deployment approval
  deployment-approval:
    name: Deployment Approval Required
    runs-on: ubuntu-latest
    # Only run if CI completed successfully on main branch
    if: github.ref == 'refs/heads/main' && github.event.workflow_run.conclusion == 'success'
    environment: 
      name: production
      url: https://everythingisawesome-e0e3cycwcwezceem.canadaeast-01.azurewebsites.net
    
    steps:
      - name: Manual approval checkpoint
        run: |
          echo "🔐 MANUAL APPROVAL REQUIRED"
          echo "=========================================="
          echo ""
          echo "✅ BUILD STATUS: SUCCESSFUL (CI workflow completed successfully)"
          echo "✅ QUALITY CHECKS: PASSED"
          echo "✅ ARTIFACTS: READY"
          echo ""
          echo "📊 DEPLOYMENT SUMMARY:"
          echo "  🎯 Target: Production Environment"
          echo "  🌐 URL: https://everythingisawesome-e0e3cycwcwezceem.canadaeast-01.azurewebsites.net"
          echo "  📦 Package: Node.js Application"
          echo "  ⚡ Runtime: Node.js 22"
          echo "  🛡️ Data Protection: /data folder will be preserved"
          echo ""
          echo "💡 CI Workflow Info:"
          echo "  📋 Conclusion: ${{ github.event.workflow_run.conclusion }}"
          echo "  🆔 Run ID: ${{ github.event.workflow_run.id }}"
          echo "  📝 Commit SHA: ${{ github.event.workflow_run.head_sha }}"
          echo ""
          echo "🚀 APPROVAL GRANTED - PROCEEDING WITH DEPLOYMENT"
          echo "=========================================="

  # Job 2: Deploy to Production
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [deployment-approval]
    if: github.ref == 'refs/heads/main' && needs.deployment-approval.result == 'success'
    # Temporarily remove environment to fix federated identity subject mismatch
    # environment: 
    #   name: production
    #   url: https://everythingisawesome-e0e3cycwcwezceem.canadaeast-01.azurewebsites.net
    
    steps:
      - name: Set application URL
        run: |
          # Set the app URL - this can be overridden by setting APP_URL repository variable
          # For now, using the default URL (can be customized later via GitHub repository variables)
          echo "APP_URL=${{ env.DEFAULT_APP_URL }}" >> $GITHUB_ENV
          echo "Using APP_URL: ${{ env.DEFAULT_APP_URL }}"
          echo ""
          echo "💡 To use a custom URL, set the APP_URL repository variable in GitHub Settings > Secrets and variables > Actions > Variables"

      - name: Download production deployment artifacts
        uses: actions/download-artifact@v4
        with:
          name: node-app
          path: ./deployment
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Verify clean deployment package
        run: |
          echo "📦 Verifying clean deployment package contents..."
          echo "Files in deployment package:"
          cd deployment && ls -la
          echo ""
          
          # Verify that node_modules folders are NOT present (good for path length)
          NODE_MODULES_FOUND=false
          if [ -d "node_modules" ]; then
            echo "⚠️ WARNING: root node_modules found in deployment package"
            NODE_MODULES_FOUND=true
          fi
          if [ -d "client/node_modules" ]; then
            echo "⚠️ WARNING: client/node_modules found in deployment package"
            NODE_MODULES_FOUND=true
          fi
          if [ -d "mobile/node_modules" ]; then
            echo "⚠️ WARNING: mobile/node_modules found in deployment package"
            NODE_MODULES_FOUND=true
          fi
          
          if [ "$NODE_MODULES_FOUND" = "false" ]; then
            echo "✅ All node_modules folders correctly excluded from deployment package"
          else
            echo "❌ Some node_modules folders found - this may cause path length issues"
          fi
          
          # Check that data folder is NOT present (good for data preservation)
          if [ -d "data" ]; then
            echo "⚠️ WARNING: data folder found in deployment package"
            ls -la data/
          else
            echo "✅ Data folder correctly excluded from deployment package"
          fi
          
          # Check for essential files and directories
          echo ""
          echo "📋 Essential files and directories check:"
          [ -f "app.js" ] && echo "✅ app.js found" || echo "❌ app.js missing"
          [ -f "package.json" ] && echo "✅ package.json found" || echo "❌ package.json missing"
          [ -f "web.config" ] && echo "✅ web.config found" || echo "❌ web.config missing"
          [ -f ".deployment" ] && echo "✅ .deployment file found" || echo "❌ .deployment file missing"
          [ -f "deploy.cmd" ] && echo "✅ deploy.cmd found" || echo "❌ deploy.cmd missing"
          [ -d "server" ] && echo "✅ server directory found" || echo "❌ server directory missing"
          [ -d "packages" ] && echo "✅ packages directory found" || echo "❌ packages directory missing"
          [ -d "client" ] && echo "✅ client directory found" || echo "❌ client directory missing"
          [ -d "client/build" ] && echo "✅ client/build directory found" || echo "❌ client/build directory missing"
          
          # Show key directory contents
          if [ -d "client/build" ]; then
            echo ""
            echo "📋 Client build files:"
            ls -la client/build/ | head -10
          fi
          
          if [ -d "packages" ]; then
            echo ""
            echo "📋 Shared packages:"
            ls -la packages/
          fi
          
          if [ -d "server" ]; then
            echo ""
            echo "📋 Server structure:"
            ls -la server/
          fi

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_B2D34B457FC84DBD932B2B893BCAB313 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_6037D42E5BA0405EA75FC80408338126 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_F976DF1D680446ECA0330678241B7509 }}

      - name: Deploy to Azure Web App (Production)
        uses: azure/webapps-deploy@v3
        id: deploy
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          slot-name: 'production'
          package: ./deployment
          clean: false  # Preserve existing files like /data folder

      - name: Configure App Settings
        run: |
          # Debug: Show current Azure context
          echo "Current Azure subscription:"
          az account show --query "{subscriptionId:id, name:name}" -o table
          
          echo "Looking for web app: ${{ env.AZURE_WEBAPP_NAME }}"
          
          # Debug: List ALL web apps first
          echo "All web apps in current subscription:"
          az webapp list --query "[].{Name:name, ResourceGroup:resourceGroup, State:state}" -o table
          
          # Get resource group with better error handling
          RESOURCE_GROUP=$(az webapp list --query "[?name=='${{ env.AZURE_WEBAPP_NAME }}'].resourceGroup" -o tsv)
          
          if [ -z "$RESOURCE_GROUP" ]; then
            echo "ERROR: Could not find web app '${{ env.AZURE_WEBAPP_NAME }}'"
            echo ""
            echo "This could mean:"
            echo "1. The web app doesn't exist yet"
            echo "2. The web app name is different" 
            echo "3. The web app is in a different subscription"
            echo ""
            echo "Please check the Azure portal or create the web app first."
            exit 1
          fi
          
          echo "Found resource group: $RESOURCE_GROUP"
          
          # Configure startup file for Node.js
          echo "Setting startup file to app.js..."
          az webapp config set \
            --name ${{ env.AZURE_WEBAPP_NAME }} \
            --resource-group "$RESOURCE_GROUP" \
            --startup-file "app.js"
          
          # Configure Node.js runtime settings with build optimization
          echo "Configuring Node.js runtime settings with build optimizations..."
          az webapp config appsettings set \
            --name ${{ env.AZURE_WEBAPP_NAME }} \
            --resource-group "$RESOURCE_GROUP" \
            --settings \
              WEBSITE_NODE_DEFAULT_VERSION=~${{ env.NODE_VERSION }} \
              WEBSITE_RUN_FROM_PACKAGE=0 \
              SCM_DO_BUILD_DURING_DEPLOYMENT=true \
              ENABLE_ORYX_BUILD=true \
              POST_BUILD_SCRIPT_PATH="npm install --production --no-optional" \
              WEBSITE_HTTPLOGGING_RETENTION_DAYS=3 \
              SCM_COMMAND_IDLE_TIMEOUT=7200
          
          # Configure application environment variables
          echo "Setting application environment variables..."
          az webapp config appsettings set \
            --name ${{ env.AZURE_WEBAPP_NAME }} \
            --resource-group "$RESOURCE_GROUP" \
            --settings \
              NODE_ENV=production \
              GROK_API_KEY="${{ secrets.GROK_API_KEY }}" \
              NEWS_API_KEY="${{ secrets.NEWS_API_KEY }}"

      - name: Restart application
        run: |
          RESOURCE_GROUP=$(az webapp list --query "[?name=='${{ env.AZURE_WEBAPP_NAME }}'].resourceGroup" -o tsv)
          
          if [ -z "$RESOURCE_GROUP" ]; then
            echo "ERROR: Could not find web app '${{ env.AZURE_WEBAPP_NAME }}'"
            exit 1
          fi
          
          echo "Restarting web app in resource group: $RESOURCE_GROUP"
          az webapp restart --name ${{ env.AZURE_WEBAPP_NAME }} --resource-group "$RESOURCE_GROUP"

      - name: Verify data folder preservation
        run: |
          RESOURCE_GROUP=$(az webapp list --query "[?name=='${{ env.AZURE_WEBAPP_NAME }}'].resourceGroup" -o tsv)
          
          if [ -z "$RESOURCE_GROUP" ]; then
            echo "ERROR: Could not find web app '${{ env.AZURE_WEBAPP_NAME }}'"
            exit 1
          fi
          
          echo "🔍 Verifying that data folder is preserved on server..."
          
          # Use Azure CLI to check if data folder exists on the server
          # This command lists the site's file structure
          DATA_FOLDER_CHECK=$(az webapp deploy list-publishing-credentials \
            --name ${{ env.AZURE_WEBAPP_NAME }} \
            --resource-group "$RESOURCE_GROUP" \
            --query "scmUri" -o tsv 2>/dev/null || echo "")
          
          if [ -n "$DATA_FOLDER_CHECK" ]; then
            echo "✅ Azure Web App is accessible for verification"
          else
            echo "⚠️ Could not verify data folder directly, but deployment used clean: false"
          fi

      - name: Run production smoke tests
        run: |
          # Wait for deployment to be ready
          sleep 60
          
          # Enhanced health check with data folder verification
          echo "🏥 Running enhanced health check..."
          echo "Testing app URL: $APP_URL"
          HEALTH_RESPONSE=$(curl -s ${APP_URL}/health)
          echo "Health response: $HEALTH_RESPONSE"
          
          # Parse health response to check data folder
          DATA_FOLDER_EXISTS=$(echo "$HEALTH_RESPONSE" | grep -o '"folder_exists":[^,}]*' | cut -d':' -f2 | tr -d ' ')
          JSON_FILES=$(echo "$HEALTH_RESPONSE" | grep -o '"json_files":[^,}]*' | cut -d':' -f2 | tr -d ' ')
          IMAGE_FILES=$(echo "$HEALTH_RESPONSE" | grep -o '"image_files":[^,}]*' | cut -d':' -f2 | tr -d ' ')
          
          echo "📁 Data folder exists: $DATA_FOLDER_EXISTS"
          echo "📄 JSON files count: $JSON_FILES"
          echo "🖼️ Image files count: $IMAGE_FILES"
          
          if [ "$DATA_FOLDER_EXISTS" = "true" ]; then
            echo "✅ Data folder successfully preserved on server"
          else
            echo "❌ ERROR: Data folder not found on server!"
            exit 1
          fi
          
          # API endpoint check
          curl -f ${APP_URL}/api/news/latest || exit 1
          
          # Test that a specific generated image is available
          echo "🖼️ Testing specific generated image availability..."
          curl -f -I ${APP_URL}/generated-images/fallback-hope.png && echo "✅ Generated images accessible" || echo "⚠️ Some images may not be available"
          
          echo "✅ Production deployment successful and data folder preserved"

      - name: Create deployment summary
        run: |
          echo "## 🚀 Production Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Component | Status | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|-----------|--------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "| Web App | ✅ Deployed | ${APP_URL} |" >> $GITHUB_STEP_SUMMARY
          echo "| API (Latest News) | ✅ Healthy | ${APP_URL}/api/news/latest |" >> $GITHUB_STEP_SUMMARY
          echo "| API (Dates) | ✅ Healthy | ${APP_URL}/api/news/dates |" >> $GITHUB_STEP_SUMMARY
          echo "| Health Check | ✅ Passed | ${APP_URL}/health |" >> $GITHUB_STEP_SUMMARY
          echo "| Data Folder | ✅ Preserved | /data directory maintained on server |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### �️ Path Length Issue Resolution" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ **Problem Fixed**: Windows 260-character path limit resolved" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ **Clean Artifact**: node_modules excluded from deployment package" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ **Azure Build**: Dependencies installed on Azure during deployment" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ **Optimized Size**: Deployment package dramatically reduced in size" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### �📁 Data Preservation Details" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Data folder excluded from deployment artifact" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Azure deployment used \`clean: false\` setting" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Persistent data verified via health endpoint" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Generated images remain accessible" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "🎉 **Deployment completed successfully with path length issue resolved!**" >> $GITHUB_STEP_SUMMARY

  # Job 3: Handle deployment rejection
  deployment-rejected:
    name: Deployment Rejected
    runs-on: ubuntu-latest
    if: always() && needs.deployment-approval.result != 'success' && github.ref == 'refs/heads/main'
    needs: [deployment-approval]
    
    steps:
      - name: Handle rejection
        run: |
          echo "❌ DEPLOYMENT REJECTED OR CANCELLED"
          echo "=================================="
          echo ""
          echo "📋 Status: Manual approval was not granted"
          echo "🚫 Action: Deployment has been stopped"
          echo "📊 Build Status: Completed successfully (artifacts preserved)"
          echo ""
          echo "ℹ️  The build completed successfully but deployment was not approved."
          echo "   You can re-run the workflow to attempt deployment again."
          echo ""
          echo "=================================="
          
          # Add to step summary
          echo "## ❌ Deployment Rejected" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "The deployment to production was rejected or cancelled during the manual approval process." >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ✅ What was completed:" >> $GITHUB_STEP_SUMMARY
          echo "- Build completed successfully" >> $GITHUB_STEP_SUMMARY
          echo "- All quality checks passed" >> $GITHUB_STEP_SUMMARY
          echo "- Artifacts are ready for deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ❌ What was cancelled:" >> $GITHUB_STEP_SUMMARY
          echo "- Production deployment" >> $GITHUB_STEP_SUMMARY
          echo "- Azure Web App update" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔄 Next Steps:" >> $GITHUB_STEP_SUMMARY
          echo "- Review the changes if needed" >> $GITHUB_STEP_SUMMARY
          echo "- Re-run the workflow when ready to deploy" >> $GITHUB_STEP_SUMMARY
          echo "- Or make additional changes and push to trigger a new build" >> $GITHUB_STEP_SUMMARY

  # Job 4: Rollback (if deployment fails)
  rollback:
    name: Rollback Deployment
    runs-on: ubuntu-latest
    if: failure() && needs.deploy-production.result == 'failure'
    needs: [deployment-approval, deploy-production]
    
    steps:
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_B2D34B457FC84DBD932B2B893BCAB313 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_6037D42E5BA0405EA75FC80408338126 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_F976DF1D680446ECA0330678241B7509 }}

      - name: Rollback to previous deployment
        run: |
          RESOURCE_GROUP=$(az webapp list --query "[?name=='${{ env.AZURE_WEBAPP_NAME }}'].resourceGroup" -o tsv)
          
          if [ -z "$RESOURCE_GROUP" ]; then
            echo "ERROR: Could not find web app '${{ env.AZURE_WEBAPP_NAME }}'"
            exit 1
          fi
          
          echo "Looking for previous deployment in resource group: $RESOURCE_GROUP"
          
          # Get deployment history using the correct Azure CLI command
          echo "Checking deployment slots..."
          az webapp deployment slot list \
            --name ${{ env.AZURE_WEBAPP_NAME }} \
            --resource-group "$RESOURCE_GROUP" || echo "No deployment slots found"
          
          # Try to get deployment history
          echo "Checking deployment history..."
          DEPLOYMENT_HISTORY=$(az webapp deployment source show \
            --name ${{ env.AZURE_WEBAPP_NAME }} \
            --resource-group "$RESOURCE_GROUP" 2>/dev/null || echo "No deployment history found")
          
          echo "Deployment history: $DEPLOYMENT_HISTORY"
          
          # For now, restart the app to try to recover from a failed state
          echo "Attempting to restart the web app to recover from failed deployment..."
          az webapp restart \
            --name ${{ env.AZURE_WEBAPP_NAME }} \
            --resource-group "$RESOURCE_GROUP"
          
          echo "Web app restarted. Manual intervention may be required for full rollback."
          echo "Consider using Azure Portal to restore from a backup or redeploy a previous version."

      - name: Notify rollback
        run: |
          echo "## ⚠️ Deployment Rollback Executed" >> $GITHUB_STEP_SUMMARY
          echo "The deployment failed and rollback steps have been attempted:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🔄 Rollback Actions Taken:" >> $GITHUB_STEP_SUMMARY
          echo "- ✅ Web app restarted to recover from failed state" >> $GITHUB_STEP_SUMMARY
          echo "- 🔍 Deployment history checked" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 🛠️ Manual Actions Required:" >> $GITHUB_STEP_SUMMARY
          echo "- Check the Azure Portal for app status" >> $GITHUB_STEP_SUMMARY
          echo "- Consider restoring from backup if available" >> $GITHUB_STEP_SUMMARY
          echo "- Review deployment logs and fix issues before retrying" >> $GITHUB_STEP_SUMMARY
          echo "- Re-run the workflow when ready" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "💡 **Note**: The `/data` folder should remain preserved even during rollback attempts."
